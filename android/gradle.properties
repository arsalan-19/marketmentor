# Enable AndroidX mapping for modern libraries (Crucial for Jetpack Compose)
android.useAndroidX=true

# Automatically convert older third-party libraries to use AndroidX
android.enableJetifier=true

# Local compiler optimization parameters to speed up builds on your laptop
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.caching=true
org.gradle.parallel=true
